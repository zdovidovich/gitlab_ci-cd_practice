stages:
    - Dockerfile_lint
    - tests
    - build
    - scan_image
    - deploy_dev
    - deploy_prod

.docker_login:
    before_script:
        - echo $CI_REGISTRY_PASSWORD | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

Dockerfile_lint:
    stage: Dockerfile_lint
    image: hadolint/hadolint:v2.14.0-alpine
    script:
        - hadolint --error 1 Dockerfile

pytest:
    stage: tests
    image: python:3.14.5-alpine3.23
    script:
        - pytest

build_image:
    extends: .docker_login
    stage: build
    script:
        - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

scan_image:
    extends: .docker_login
    stage: scan_image
    image: aquasec/trivy
    script:
        - trivy image -q --exit-code 1 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

deploy_dev:
    needs: [build_image]
    rules:
        - if: $CI_COMMIT_BRANCH == "dev"
    stage: deploy_dev
    image: alpine:3.22.4
    script:
        - apk add openssh-client-default=10.3p1
        - ssh-add $DEV_SERVER_SSH_KEY
        - ssh $DEV_SERVER echo "Hello world!"
